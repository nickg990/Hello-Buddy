<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1720 1120" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="13" fill="#28404F">
  <defs>
    <style>
      .bg { fill:#F4F8FA; }
      .panel { fill:#FFFFFF; stroke:#6392AE; stroke-width:1; }
      .card { fill:#FFFFFF; stroke:#B3CDD6; stroke-width:1; }
      .pale { fill:#D4E0E5; stroke:#B3CDD6; stroke-width:1; }
      .navItem { fill:#FFFFFF; stroke:none; }
      .btn { fill:#FFFFFF; stroke:#6392AE; stroke-width:1; }
      .btnPri { fill:#6392AE; stroke:#28404F; stroke-width:1; }
      .btnPriText { fill:#FFFFFF; font-weight:600; }
      .muted { fill:#5A6E7A; font-size:11px; }
      .title { font-size:18px; font-weight:600; }
      .h1 { font-size:22px; font-weight:700; }
      .h2 { font-size:14px; font-weight:600; }
      .divider { stroke:#B3CDD6; stroke-width:1; }
      .input { fill:#FFFFFF; stroke:#6392AE; stroke-width:1; }
      .stepActive { fill:#D4E0E5; stroke:#6392AE; stroke-width:1; }
      .stepDone { fill:#E6EFC2; stroke:#5A6E2D; stroke-width:1; }
    </style>
  </defs>

  <g id="desktop-new-patient">
    <text x="20" y="28" class="title">Desktop · 1280 px · New patient journey wizard</text>
    <rect x="20" y="40" width="1280" height="1040" class="bg"/>

    <rect x="20" y="40" width="1280" height="64" class="panel"/>
    <circle cx="56" cy="72" r="18" class="pale"/><text x="48" y="76" font-size="11">logo</text>
    <text x="92" y="78" class="h2">Hello Buddy Admin</text>
    <text x="1248" y="76" text-anchor="end">Nick G.</text>

    <rect x="20" y="104" width="240" height="976" class="panel"/>
    <rect x="32" y="128" width="216" height="36" class="navItem"/><text x="48" y="151">Dashboard</text>
    <rect x="32" y="172" width="216" height="36" class="navItem"/><text x="48" y="195">Owners</text>
    <rect x="32" y="216" width="216" height="36" class="navItem"/><text x="48" y="239">Pets</text>
    <rect x="32" y="260" width="216" height="36" class="navItem"/><text x="48" y="283">Treatment cases</text>
    <rect x="32" y="304" width="216" height="36" class="navItem"/><text x="48" y="327">Programmes</text>
    <rect x="32" y="348" width="216" height="36" class="navItem"/><text x="48" y="371">Exercise library</text>
    <rect x="32" y="392" width="216" height="36" class="navItem"/><text x="48" y="415">Published PDFs</text>
    <rect x="32" y="436" width="216" height="36" class="navItem"/><text x="48" y="459">Settings</text>
    <line x1="32" y1="488" x2="248" y2="488" class="divider"/>
    <text x="48" y="512" class="muted">Wizard steps</text>
    <rect x="32" y="528" width="216" height="30" class="stepActive"/><text x="48" y="548">1 · Owner details</text>
    <rect x="32" y="564" width="216" height="30" class="card"/><text x="48" y="584">2 · Pet details</text>
    <rect x="32" y="600" width="216" height="30" class="card"/><text x="48" y="620">3 · Treatment case</text>
    <rect x="32" y="636" width="216" height="30" class="card"/><text x="48" y="656">4 · Review</text>

    <text x="284" y="126" class="muted">Dashboard / New patient journey</text>
    <text x="284" y="154" class="h1">New patient journey</text>
    <text x="284" y="174" class="muted">Create owner, pet, and treatment case in one guided flow</text>

    <rect x="284" y="196" width="700" height="760" class="card"/>
    <text x="304" y="224" class="h2">Step 1 · Owner details</text>
    <text x="304" y="244" class="muted">Keep this quick and safe. Required fields only first.</text>
    <line x1="284" y1="260" x2="984" y2="260" class="divider"/>

    <text x="304" y="296" class="muted">Owner full name</text>
    <rect x="304" y="304" width="300" height="32" class="input"/>
    <text x="316" y="325" class="muted">Sarah Patel</text>

    <text x="304" y="368" class="muted">Mobile number</text>
    <rect x="304" y="376" width="300" height="32" class="input"/>
    <text x="316" y="397" class="muted">07712 555 112</text>

    <text x="304" y="440" class="muted">Email</text>
    <rect x="304" y="448" width="300" height="32" class="input"/>
    <text x="316" y="469" class="muted">sarah.patel@example.com</text>

    <text x="304" y="512" class="muted">Preferred contact</text>
    <rect x="304" y="520" width="180" height="32" class="input"/>
    <text x="316" y="541" class="muted">WhatsApp ▾</text>

    <text x="304" y="584" class="muted">Address</text>
    <rect x="304" y="592" width="420" height="80" class="input"/>

    <rect x="304" y="888" width="120" height="40" class="btn"/><text x="342" y="913">Cancel</text>
    <rect x="436" y="888" width="152" height="40" class="btnPri"/><text x="468" y="913" class="btnPriText">Save and next</text>

    <rect x="1004" y="196" width="276" height="320" class="card"/>
    <text x="1024" y="224" class="h2">Why this wizard exists</text>
    <line x1="1004" y1="238" x2="1280" y2="238" class="divider"/>
    <text x="1024" y="270" class="muted">• Keeps first-time setup linear</text>
    <text x="1024" y="292" class="muted">• Reduces missed links between owner, pet, and case</text>
    <text x="1024" y="314" class="muted">• Lets admin staff set up records safely</text>
    <text x="1024" y="336" class="muted">• Gives practitioners a ready-to-use case</text>

    <rect x="1004" y="536" width="276" height="160" class="card"/>
    <text x="1024" y="564" class="h2">Progress snapshot</text>
    <line x1="1004" y1="578" x2="1280" y2="578" class="divider"/>
    <rect x="1024" y="600" width="236" height="28" class="stepActive"/><text x="1040" y="619">Owner in progress</text>
    <rect x="1024" y="636" width="236" height="28" class="card"/><text x="1040" y="655">Pet pending</text>
    <rect x="1024" y="672" width="236" height="28" class="card"/><text x="1040" y="691">Case pending</text>
  </g>

  <g id="mobile-new-patient" transform="translate(1340, 0)">
    <text x="0" y="28" class="title">Mobile · 360 px</text>
    <rect x="0" y="40" width="360" height="1040" class="bg"/>
    <rect x="0" y="40" width="360" height="56" class="panel"/>
    <rect x="12" y="56" width="24" height="24" class="card"/><text x="18" y="73" font-size="11">←</text>
    <text x="48" y="74" class="h2">New patient</text>

    <rect x="12" y="108" width="104" height="28" class="stepActive"/><text x="28" y="127" class="muted">1 Owner</text>
    <rect x="128" y="108" width="96" height="28" class="card"/><text x="158" y="127" class="muted">2 Pet</text>
    <rect x="236" y="108" width="112" height="28" class="card"/><text x="260" y="127" class="muted">3 Case</text>

    <rect x="12" y="160" width="336" height="520" class="card"/>
    <text x="28" y="188" class="h2">Owner details</text>
    <text x="28" y="214" class="muted">Required fields only first</text>
    <text x="28" y="248" class="muted">Owner name</text>
    <rect x="28" y="256" width="304" height="36" class="input"/>
    <text x="28" y="320" class="muted">Mobile</text>
    <rect x="28" y="328" width="304" height="36" class="input"/>
    <text x="28" y="392" class="muted">Email</text>
    <rect x="28" y="400" width="304" height="36" class="input"/>
    <text x="28" y="464" class="muted">Preferred contact</text>
    <rect x="28" y="472" width="304" height="36" class="input"/>

    <rect x="0" y="780" width="360" height="68" class="panel"/>
    <rect x="12" y="794" width="140" height="40" class="btn"/><text x="54" y="818">Cancel</text>
    <rect x="164" y="794" width="184" height="40" class="btnPri"/><text x="210" y="818" class="btnPriText">Save and next</text>
  </g>
</svg>