    <text x="392" y="300" fill="#B3CDD6" font-size="11">Programme for Bella · Version 2</text>
    <text x="340" y="356" class="h2">Right hind cruciate post-op</text>
    <text x="340" y="376" class="muted">Owner: Mrs S. Patel · Practitioner: Nick Gilbert</text>
    <text x="340" y="396" class="muted">22 Apr 2026 to 20 May 2026</text>
    <rect x="340" y="430" width="508" height="28" class="pale"/><text x="352" y="449" class="h2">AM session</text>
