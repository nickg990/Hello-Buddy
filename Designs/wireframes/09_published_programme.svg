    <text x="24" y="254" class="h2">Cruciate post-op</text>
    <text x="24" y="274" class="muted">Owner-facing PDF preview</text>

    <rect x="12" y="648" width="336" height="96" class="card"/>
    <text x="28" y="672" class="h2">Version history</text>
    <text x="28" y="692" class="muted">v2 current · v1 superseded</text>
    <rect x="200" y="660" width="136" height="32" class="btnPri"/><text x="218" y="680" class="btnPriText">+ New draft</text>

    <rect x="0" y="780" width="360" height="68" class="panel"/>
    <rect x="12" y="794" width="160" height="40" class="btn"/><text x="48" y="818">Download PDF</text>
    <rect x="184" y="794" width="164" height="40" class="btnPri"/><text x="214" y="818" class="btnPriText">Copy link</text>
