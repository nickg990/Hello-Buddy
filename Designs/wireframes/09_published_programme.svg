    <text x="356" y="514" class="muted">10 reps · 3 sets · 1 x per day</text>
    <text x="356" y="534" class="muted">Watch demo video</text>
    <rect x="340" y="582" width="508" height="28" class="pale"/><text x="352" y="601" class="h2">PM session</text>
    <rect x="340" y="622" width="508" height="90" class="card"/>
    <text x="356" y="646">1 · Cavaletti walk</text>
    <text x="356" y="666" class="muted">8 reps · 2 sets · 1 x per day</text>
    <text x="356" y="686" class="muted">Watch demo video</text>

    <rect x="924" y="196" width="356" height="300" class="card"/>
    <text x="944" y="222" class="h2">Version metadata</text>
    <line x1="924" y1="236" x2="1280" y2="236" class="divider"/>
    <text x="944" y="266" class="muted">Version</text><text x="944" y="286">v2 current</text>
    <text x="944" y="318" class="muted">Published by</text><text x="944" y="338">Nick Gilbert</text>
    <text x="944" y="370" class="muted">File</text><text x="944" y="390">bella-programme-v2.pdf</text>
    <text x="944" y="422" class="muted">Storage</text><text x="944" y="442">Blob: published-programmes</text>

    <rect x="924" y="516" width="356" height="540" class="card"/>
    <text x="944" y="542" class="h2">Version history</text>
    <line x1="924" y1="556" x2="1280" y2="556" class="divider"/>
    <text x="944" y="590">v2 · Current</text><text x="1220" y="590" class="muted">22 Apr</text>
    <text x="944" y="610" class="muted">Published after reassessment</text>
    <line x1="944" y1="634" x2="1260" y2="634" class="divider"/>
    <text x="944" y="668">v1 · Superseded</text><text x="1220" y="668" class="muted">04 Apr</text>
    <text x="944" y="688" class="muted">Initial post-op programme</text>
    <line x1="944" y1="712" x2="1260" y2="712" class="divider"/>
    <rect x="944" y="740" width="180" height="36" class="btnPri"/><text x="968" y="764" class="btnPriText">Create new draft from v2</text>
