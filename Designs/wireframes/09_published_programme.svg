    <rect x="312" y="56" width="36" height="24" class="card"/><text x="322" y="73" font-size="11">⋯</text>

    <text x="16" y="120" class="h2">Bella · v2 current</text>
    <text x="16" y="140" class="muted">Published 22 Apr · Nick Gilbert</text>

